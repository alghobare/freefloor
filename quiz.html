<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | FreeFloor</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #1a1a2e;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.navbar {
    background-color: #212133;
    color: white;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    padding: 15px 30px;
    position: fixed;
    top: 0;
    width: 100%;
    box-sizing: border-box;
    z-index: 1000;
}

.navbar .logo {
    color: #a855f7;
    font-size: 24px;
    font-weight: bold;
}

.under-construction-banner {
    background-color: #6b21a8;
    color: white;
    padding: 60px 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    max-width: 600px;
    width: 90%;
}

.warning-icon {
    font-size: 64px;
}

.under-construction-banner h1 {
    margin: 20px 0;
    font-size: 32px;
}

.admin-signature {
    margin-top: 40px;
    text-align: center;
    font-size: 14px;
    color: #888;
}

.admin-name {
    margin-top: 5px;
    font-weight: bold;
    color: white;
}

.purple-text {
    color: #a855f7;
}
</style>

<body>

    <nav class="navbar">
        <div class="logo">FreeFloor</div>
    </nav>

    <main class="content-area">
        
        <div class="under-construction-banner">
            <div class="icon-container">
                <span class="warning-icon">🚧</span>
            </div>
            <h1>This page is not ready yet</h1>
            <p>We are working hard to complete the content and provide a better experience. Thank you for your patience.</p>
        </div>

        <footer class="admin-signature">
            <p>Signed by:</p>
            <p class="admin-name">Admin <span class="purple-text">Abdul Rahman El-Ghabary</span></p>
        </footer>
    </main>

</body>
</html>
